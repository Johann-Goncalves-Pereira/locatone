<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Locatone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="atmosphere" aria-hidden="true"></div>
    <div class="shell">
      <header class="brand">
        <h1 class="font-display">Locatone</h1>
        <p class="tagline">Spoof where the browser thinks you are</p>
      </header>

      <label class="field">
        <span class="label">Location</span>
        <textarea
          id="input"
          rows="1"
          spellcheck="false"
          placeholder="lat, lng · DMS · Maps URL"
        ></textarea>
      </label>

      <div class="row actions">
        <button type="button" id="apply" class="btn primary">Apply</button>
        <label class="toggle">
          <input type="checkbox" id="enabled" />
          <span>Enable spoofing</span>
        </label>
      </div>

      <div id="resolved" class="resolved" hidden>
        <div class="resolved-grid">
          <div>
            <span class="k">Lat</span>
            <span id="lat" class="v"></span>
          </div>
          <div>
            <span class="k">Lng</span>
            <span id="lng" class="v"></span>
          </div>
          <div>
            <span class="k">Timezone</span>
            <span id="timezone" class="v"></span>
          </div>
          <div>
            <span class="k">Locale</span>
            <span id="locale" class="v"></span>
          </div>
          <div>
            <span class="k">Currency</span>
            <span id="currency" class="v"></span>
          </div>
          <div>
            <span class="k">Country</span>
            <span id="country" class="v"></span>
          </div>
        </div>
        <div id="coverage" class="coverage" aria-label="Coverage">
          <span class="chip">Geo</span>
          <span class="chip">Intl</span>
          <span class="chip">Fonts</span>
          <span class="chip">WebRTC</span>
          <span class="chip">IP</span>
          <span class="chip">Headers</span>
          <span class="chip">Voices</span>
        </div>
      </div>

      <section class="proxy" id="proxySection">
        <button
          type="button"
          id="proxyToggle"
          class="proxy-toggle"
          aria-expanded="false"
          aria-controls="proxyBody"
        >
          <span class="proxy-toggle-label font-display">
            Proxy
            <span class="hint">(optional — for real IP)</span>
          </span>
          <span id="proxyBadge" class="proxy-badge">Off</span>
          <span class="proxy-chevron" aria-hidden="true"></span>
        </button>
        <div id="proxyBody" class="proxy-body" hidden>
          <label class="field">
            <span class="label">Mode</span>
            <select id="proxyMode">
              <option value="none">Off</option>
              <option value="http">HTTP</option>
              <option value="socks5">SOCKS5</option>
            </select>
          </label>
          <div id="proxyDetails" class="proxy-details" hidden>
            <div class="row">
              <label class="field grow">
                <span class="label">Host</span>
                <input
                  id="proxyHost"
                  type="text"
                  placeholder="127.0.0.1"
                  autocomplete="off"
                />
              </label>
              <label class="field port">
                <span class="label">Port</span>
                <input
                  id="proxyPort"
                  type="text"
                  placeholder="1080"
                  autocomplete="off"
                />
              </label>
            </div>
            <div class="row">
              <label class="field grow">
                <span class="label">Username</span>
                <input
                  id="proxyUser"
                  type="text"
                  placeholder="optional"
                  autocomplete="off"
                />
              </label>
              <label class="field grow">
                <span class="label">Password</span>
                <input
                  id="proxyPass"
                  type="password"
                  placeholder="optional"
                  autocomplete="off"
                />
              </label>
            </div>
          </div>
        </div>
      </section>

      <footer class="footer">
        <p id="status" class="status" role="status">Spoofing off</p>
        <p id="edgeWarn" class="edge-warn" hidden>
          Server-side edge geo still sees your real exit IP. Enable a VPN or
          proxy near the spoofed place if you need Vercel <code>edge_geo</code>
          to match client spoofing.
        </p>
        <p id="error" class="error" hidden></p>
      </footer>
    </div>

    <script src="../lib/parse-location.js"></script>
    <script src="../lib/timezone.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
