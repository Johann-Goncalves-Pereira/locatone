<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Locatone</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="shell">
      <header class="brand">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Locatone</h1>
          <p class="tagline">Spoof where the browser thinks you are</p>
        </div>
      </header>

      <label class="field">
        <span class="label">Location</span>
        <textarea
          id="input"
          rows="3"
          spellcheck="false"
          placeholder="59.456619, 24.697315&#10;59°27'23.8&quot;N 24°41'50.2&quot;E&#10;https://maps.app.goo.gl/…"
        ></textarea>
      </label>

      <div class="row actions">
        <button type="button" id="apply" class="btn primary">Apply</button>
        <label class="toggle">
          <input type="checkbox" id="enabled" />
          <span>Enable spoofing</span>
        </label>
      </div>

      <div id="resolved" class="resolved" hidden>
        <div class="resolved-grid">
          <div>
            <span class="k">Lat</span>
            <span id="lat" class="v"></span>
          </div>
          <div>
            <span class="k">Lng</span>
            <span id="lng" class="v"></span>
          </div>
          <div>
            <span class="k">Timezone</span>
            <span id="timezone" class="v"></span>
          </div>
          <div>
            <span class="k">Locale</span>
            <span id="locale" class="v"></span>
          </div>
        </div>
      </div>

      <section class="proxy">
        <h2>Proxy <span class="hint">(optional — for real IP)</span></h2>
        <div class="row">
          <label class="field grow">
            <span class="label">Mode</span>
            <select id="proxyMode">
              <option value="none">Off</option>
              <option value="http">HTTP</option>
              <option value="socks5">SOCKS5</option>
            </select>
          </label>
          <label class="field grow">
            <span class="label">Host</span>
            <input id="proxyHost" type="text" placeholder="127.0.0.1" autocomplete="off" />
          </label>
          <label class="field port">
            <span class="label">Port</span>
            <input id="proxyPort" type="text" placeholder="1080" autocomplete="off" />
          </label>
        </div>
        <div class="row">
          <label class="field grow">
            <span class="label">Username</span>
            <input id="proxyUser" type="text" placeholder="optional" autocomplete="off" />
          </label>
          <label class="field grow">
            <span class="label">Password</span>
            <input id="proxyPass" type="password" placeholder="optional" autocomplete="off" />
          </label>
        </div>
      </section>

      <p id="status" class="status" role="status">Spoofing off</p>
      <p id="error" class="error" hidden></p>
    </div>

    <script src="../lib/parse-location.js"></script>
    <script src="../lib/timezone.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
